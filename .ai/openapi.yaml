      operationId: adminListProducts
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query
          schema: { type: string }
        - name: categoryId
          in: query
          schema: { type: string, format: uuid }
        - name: brandId
          in: query
          schema: { type: string, format: uuid }
        - name: isActive
          in: query
          schema: { type: boolean }
        - name: includeDeleted
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Paginated product list (admin view)
    post:
      tags: [Admin / Products]
      summary: Create a new product
      operationId: adminCreateProduct
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProductRequest" }
      responses:
        "201":
          description: Product created

  /admin/products/{id}:
    get:
      tags: [Admin / Products]
      summary: Get product by ID
      operationId: adminGetProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Product detail
    patch:
      tags: [Admin / Products]
      summary: Update product
      operationId: adminUpdateProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProductRequest" }
      responses:
        "200":
          description: Product updated
    delete:
      tags: [Admin / Products]
      summary: Soft-delete a product
      operationId: adminDeleteProduct
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Product deleted

  /admin/products/{id}/variants:
    post:
      tags: [Admin / Products]
      summary: Add variant to product
      operationId: adminCreateVariant
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateVariantRequest" }
      responses:
        "201":
          description: Variant created

  /admin/products/{id}/variants/{variantId}:
    patch:
      tags: [Admin / Products]
      summary: Update variant
      operationId: adminUpdateVariant
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: variantId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { $ref: "#/components/schemas/LocaleJson" }
                sku: { type: string }
                price: { $ref: "#/components/schemas/Money" }
                comparePrice: { $ref: "#/components/schemas/Money" }
                taxRate: { type: number }
                weight: { type: integer }
                isActive: { type: boolean }
                sortOrder: { type: integer }
                optionIds:
                  type: array
                  items: { $ref: "#/components/schemas/ID" }
      responses:
        "200":
          description: Variant updated
    delete:
      tags: [Admin / Products]
      summary: Delete variant
      operationId: adminDeleteVariant
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: variantId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Variant deleted

  /admin/products/{id}/images:
    post:
      tags: [Admin / Products]
      summary: Upload product image
      operationId: adminUploadProductImage
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                alt: { type: string }
                variantId: { type: string, format: uuid }
                sortOrder: { type: integer }
      responses:
        "201":
          description: Image uploaded

  /admin/products/{id}/images/{imageId}:
    delete:
      tags: [Admin / Products]
      summary: Delete product image
      operationId: adminDeleteProductImage
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: imageId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Image deleted

  /admin/products/{id}/option-groups:
    post:
      tags: [Admin / Products]
      summary: Create option group
      operationId: adminCreateOptionGroup
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
