      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { $ref: "#/components/schemas/LocaleJson" }
                sortOrder: { type: integer }
                options:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { $ref: "#/components/schemas/LocaleJson" }
                      value: { $ref: "#/components/schemas/LocaleJson" }
                      sortOrder: { type: integer }
      responses:
        "201":
          description: Option group created

  /admin/products/{id}/option-groups/{groupId}:
