openapi: "3.0.3"
info:
  title: "Minh An Uniform — REST API"
  version: "1.0.0"
  description: |
    REST API for Minh An Uniform ecommerce platform.
    Two API surfaces: Storefront (public/customer) and Admin (backoffice).
servers:
  - url: http://localhost:3000/api/v1
    description: Storefront API
  - url: http://localhost:3002/api/v1/admin
    description: Admin API

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionId:
      type: apiKey
      in: header
      name: X-Session-Id

  schemas:
    # ── Shared ────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
      required: [success, error]

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        totalItems: { type: integer }
        totalPages: { type: integer }
      required: [page, pageSize, totalItems, totalPages]

    LocaleJson:
      type: object
      description: Multi-locale JSONB — { en, vi, de }
      properties:
        en: { type: string }
        vi: { type: string }
        de: { type: string }

    ID:
      type: string
      format: uuid
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    Money:
      type: integer
      description: Amount in cents
      example: 299000

    # ── Auth ───────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
      required: [email, password]

    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            token: { type: string }
            user: { $ref: "#/components/schemas/UserProfile" }
            expiresAt: { type: string, format: date-time }
      required: [success, data]

    RegisterRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
      required: [email, password]

    UserProfile:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
        createdAt: { type: string, format: date-time }

    # ── Products ──────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        basePrice: { $ref: "#/components/schemas/Money" }
        taxRate: { type: number }
        isActive: { type: boolean }
        isFeatured: { type: boolean }
        weight: { type: integer }
        category: { $ref: "#/components/schemas/CategorySummary" }
        brand: { $ref: "#/components/schemas/BrandSummary" }
        images:
          type: array
          items: { $ref: "#/components/schemas/ProductImage" }
        variants:
          type: array
          items: { $ref: "#/components/schemas/ProductVariant" }
        optionGroups:
          type: array
          items: { $ref: "#/components/schemas/OptionGroup" }
        seoTitle: { $ref: "#/components/schemas/LocaleJson" }
        seoDescription: { $ref: "#/components/schemas/LocaleJson" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProductSummary:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        basePrice: { $ref: "#/components/schemas/Money" }
        isFeatured: { type: boolean }
        primaryImage: { type: string, format: uri }
        category: { $ref: "#/components/schemas/CategorySummary" }
        brand: { $ref: "#/components/schemas/BrandSummary" }

    ProductVariant:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        sku: { type: string }
        price: { $ref: "#/components/schemas/Money" }
        comparePrice: { $ref: "#/components/schemas/Money" }
        taxRate: { type: number }
        weight: { type: integer }
        stock: { type: integer }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        options:
          type: array
          items: { $ref: "#/components/schemas/OptionValue" }
        createdAt: { type: string, format: date-time }

    ProductImage:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        url: { type: string, format: uri }
        alt: { $ref: "#/components/schemas/LocaleJson" }
        sortOrder: { type: integer }

    OptionGroup:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        sortOrder: { type: integer }
        options:
          type: array
          items: { $ref: "#/components/schemas/OptionValue" }

    OptionValue:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        value: { $ref: "#/components/schemas/LocaleJson" }
        sortOrder: { type: integer }
        groupId: { $ref: "#/components/schemas/ID" }

    CreateProductRequest:
      type: object
      properties:
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        categoryId: { $ref: "#/components/schemas/ID" }
        brandId: { $ref: "#/components/schemas/ID" }
        taxRate: { type: number, default: 0 }
        weight: { type: integer, default: 0 }
        isFeatured: { type: boolean, default: false }
        metaTitle: { $ref: "#/components/schemas/LocaleJson" }
        metaDesc: { $ref: "#/components/schemas/LocaleJson" }
      required: [name, slug, categoryId]

    UpdateProductRequest:
      type: object
      properties:
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        categoryId: { $ref: "#/components/schemas/ID" }
        brandId: { $ref: "#/components/schemas/ID" }
        taxRate: { type: number }
        weight: { type: integer }
        isFeatured: { type: boolean }
        isActive: { type: boolean }
        metaTitle: { $ref: "#/components/schemas/LocaleJson" }
        metaDesc: { $ref: "#/components/schemas/LocaleJson" }

    CreateVariantRequest:
      type: object
      properties:
        name: { $ref: "#/components/schemas/LocaleJson" }
        sku: { type: string }
        price: { $ref: "#/components/schemas/Money" }
        comparePrice: { $ref: "#/components/schemas/Money" }
        taxRate: { type: number, default: 0 }
        weight: { type: integer, default: 0 }
        optionIds:
          type: array
          items: { $ref: "#/components/schemas/ID" }
      required: [name, sku, price]

    # ── Categories ────────────────────────────────────────────────────────
    Category:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        imageUrl: { type: string, format: uri }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        parentId: { $ref: "#/components/schemas/ID" }
        children:
          type: array
          items: { $ref: "#/components/schemas/Category" }
        productCount: { type: integer }
        createdAt: { type: string, format: date-time }

    CategorySummary:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }

    CreateCategoryRequest:
      type: object
      properties:
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        imageUrl: { type: string, format: uri }
        parentId: { $ref: "#/components/schemas/ID" }
        sortOrder: { type: integer, default: 0 }
      required: [name, slug]

    # ── Brands ────────────────────────────────────────────────────────────
    Brand:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        logoUrl: { type: string, format: uri }
        websiteUrl: { type: string, format: uri }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        productCount: { type: integer }
        createdAt: { type: string, format: date-time }

    BrandSummary:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }

    CreateBrandRequest:
      type: object
      properties:
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        logoUrl: { type: string, format: uri }
        websiteUrl: { type: string, format: uri }
        sortOrder: { type: integer, default: 0 }
      required: [name, slug]

    # ── Inventory ─────────────────────────────────────────────────────────
    Inventory:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        variantId: { $ref: "#/components/schemas/ID" }
        quantity: { type: integer }
        reserved: { type: integer }
        available: { type: integer }
        lowStockLevel: { type: integer }
        trackInventory: { type: boolean }
        allowBackorder: { type: boolean }
        updatedAt: { type: string, format: date-time }

    UpdateInventoryRequest:
      type: object
      properties:
        quantity: { type: integer }
        lowStockLevel: { type: integer }
        trackInventory: { type: boolean }
        allowBackorder: { type: boolean }

    InventoryAdjustmentRequest:
      type: object
      properties:
        variantId: { $ref: "#/components/schemas/ID" }
        delta: { type: integer, description: "Positive to add, negative to subtract" }
        reason: { type: string }
      required: [variantId, delta, reason]

    # ── Cart ──────────────────────────────────────────────────────────────
    Cart:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        status: { type: string, enum: [active, converted, abandoned] }
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        coupons:
          type: array
          items: { $ref: "#/components/schemas/CartCoupon" }
        subtotal: { $ref: "#/components/schemas/Money" }
        discountTotal: { $ref: "#/components/schemas/Money" }
        grandTotal: { $ref: "#/components/schemas/Money" }
        itemCount: { type: integer }
        createdAt: { type: string, format: date-time }

    CartItem:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        variantId: { $ref: "#/components/schemas/ID" }
        variant: { $ref: "#/components/schemas/ProductVariant" }
        product: { $ref: "#/components/schemas/ProductSummary" }
        quantity: { type: integer }
        unitPrice: { $ref: "#/components/schemas/Money" }
        linePrice: { $ref: "#/components/schemas/Money" }

    CartCoupon:
      type: object
      properties:
        code: { type: string }
        discountAmount: { $ref: "#/components/schemas/Money" }

    AddCartItemRequest:
      type: object
      properties:
        variantId: { $ref: "#/components/schemas/ID" }
        quantity: { type: integer, minimum: 1, default: 1 }
      required: [variantId]

    UpdateCartItemRequest:
      type: object
      properties:
        quantity: { type: integer, minimum: 1 }
      required: [quantity]

    ApplyCouponRequest:
      type: object
      properties:
        code: { type: string }
      required: [code]

    # ── Checkout ──────────────────────────────────────────────────────────
    AddressInput:
      type: object
      properties:
        fullName: { type: string }
        company: { type: string }
        streetLine1: { type: string }
        streetLine2: { type: string }
        city: { type: string }
        province: { type: string }
        postalCode: { type: string }
        countryCode: { type: string }
        phone: { type: string }
      required: [fullName, streetLine1, city, countryCode]

    SetCustomerRequest:
      type: object
      properties:
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
      required: [email, firstName, lastName]

    ShippingMethod:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        code: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        price: { $ref: "#/components/schemas/Money" }

    PaymentMethod:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        code: { type: string }
        description: { $ref: "#/components/schemas/LocaleJson" }
        isEligible: { type: boolean }
        eligibilityMessage: { type: string }

    SelectShippingMethodRequest:
      type: object
      properties:
        shippingMethodId: { $ref: "#/components/schemas/ID" }
      required: [shippingMethodId]

    PlaceOrderRequest:
      type: object
      properties:
        paymentMethodCode: { type: string }
        paymentMetadata: { type: object }
      required: [paymentMethodCode]

    CheckoutSummary:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        shippingAddress: { $ref: "#/components/schemas/AddressInput" }
        billingAddress: { $ref: "#/components/schemas/AddressInput" }
        shippingMethod: { $ref: "#/components/schemas/ShippingMethod" }
        subtotal: { $ref: "#/components/schemas/Money" }
        shippingTotal: { $ref: "#/components/schemas/Money" }
        discountTotal: { $ref: "#/components/schemas/Money" }
        taxTotal: { $ref: "#/components/schemas/Money" }
        grandTotal: { $ref: "#/components/schemas/Money" }

    # ── Orders ────────────────────────────────────────────────────────────
    Order:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        code: { type: string, example: "MA-20260713-0001" }
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded]
        currencyCode: { type: string, example: "VND" }
        email: { type: string }
        subtotal: { $ref: "#/components/schemas/Money" }
        discountTotal: { $ref: "#/components/schemas/Money" }
        shippingTotal: { $ref: "#/components/schemas/Money" }
        taxTotal: { $ref: "#/components/schemas/Money" }
        grandTotal: { $ref: "#/components/schemas/Money" }
        shippingMethod: { type: string }
        paymentMethod: { type: string }
        notes: { type: string }
        customer: { $ref: "#/components/schemas/UserProfile" }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }
        shippingAddress: { $ref: "#/components/schemas/AddressInput" }
        billingAddress: { $ref: "#/components/schemas/AddressInput" }
        discounts:
          type: array
          items: { $ref: "#/components/schemas/OrderDiscount" }
        payments:
          type: array
          items: { $ref: "#/components/schemas/OrderPayment" }
        history:
          type: array
          items: { $ref: "#/components/schemas/OrderStatusHistory" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrderItem:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        variantId: { $ref: "#/components/schemas/ID" }
        productName: { $ref: "#/components/schemas/LocaleJson" }
        variantName: { $ref: "#/components/schemas/LocaleJson" }
        sku: { type: string }
        quantity: { type: integer }
        unitPrice: { $ref: "#/components/schemas/Money" }
        linePrice: { $ref: "#/components/schemas/Money" }
        productSlug: { type: string }
        productImage: { type: string, format: uri }

    OrderDiscount:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        couponCode: { type: string }
        description: { type: string }
        amount: { $ref: "#/components/schemas/Money" }

    OrderPayment:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        method: { type: string }
        amount: { $ref: "#/components/schemas/Money" }
        status:
          type: string
          enum: [pending, authorized, captured, failed, refunded]
        transactionId: { type: string }
        createdAt: { type: string, format: date-time }

    OrderStatusHistory:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        fromStatus: { type: string }
        toStatus: { type: string }
        note: { type: string }
        performedBy: { $ref: "#/components/schemas/ID" }
        createdAt: { type: string, format: date-time }

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, processing, shipped, delivered, cancelled, refunded]
        note: { type: string }
      required: [status]

    # ── Addresses ─────────────────────────────────────────────────────────
    Address:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        fullName: { type: string }
        company: { type: string }
        streetLine1: { type: string }
        streetLine2: { type: string }
        city: { type: string }
        province: { type: string }
        postalCode: { type: string }
        countryCode: { type: string }
        countryName: { type: string }
        phone: { type: string }
        isDefaultShipping: { type: boolean }
        isDefaultBilling: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreateAddressRequest:
      type: object
      properties:
        fullName: { type: string }
        company: { type: string }
        streetLine1: { type: string }
        streetLine2: { type: string }
        city: { type: string }
        province: { type: string }
        postalCode: { type: string }
        countryCode: { type: string }
        phone: { type: string }
        isDefaultShipping: { type: boolean, default: false }
        isDefaultBilling: { type: boolean, default: false }
      required: [fullName, streetLine1, city, countryCode]

    # ── Reviews ───────────────────────────────────────────────────────────
    Review:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        productId: { $ref: "#/components/schemas/ID" }
        userId: { $ref: "#/components/schemas/ID" }
        user:
          type: object
          properties:
            firstName: { type: string }
            lastName: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        title: { type: string }
        content: { type: string }
        isVerified: { type: boolean }
        isApproved: { type: boolean }
        helpfulCount: { type: integer }
        createdAt: { type: string, format: date-time }

    CreateReviewRequest:
      type: object
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        title: { type: string }
        content: { type: string }
      required: [rating]

    ReviewStats:
      type: object
      properties:
        averageRating: { type: number, format: float }
        totalReviews: { type: integer }
        distribution:
          type: object
          properties:
            1: { type: integer }
            2: { type: integer }
            3: { type: integer }
            4: { type: integer }
            5: { type: integer }

    # ── Coupons / Discounts ───────────────────────────────────────────────
    Discount:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        type: { type: string, enum: [percentage, fixed] }
        value: { type: integer }
        minOrderAmount: { $ref: "#/components/schemas/Money" }
        maxDiscount: { $ref: "#/components/schemas/Money" }
        target: { type: string, enum: [order, product, category] }
        targetIds:
          type: array
          items: { $ref: "#/components/schemas/ID" }
        maxUses: { type: integer }
        currentUses: { type: integer }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreateDiscountRequest:
      type: object
      properties:
        name: { $ref: "#/components/schemas/LocaleJson" }
        type: { type: string, enum: [percentage, fixed] }
        value: { type: integer }
        minOrderAmount: { $ref: "#/components/schemas/Money" }
        maxDiscount: { $ref: "#/components/schemas/Money" }
        target: { type: string, enum: [order, product, category] }
        targetIds:
          type: array
          items: { $ref: "#/components/schemas/ID" }
        maxUses: { type: integer }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
      required: [name, type, value]

    Coupon:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        discountId: { $ref: "#/components/schemas/ID" }
        code: { type: string }
        maxUses: { type: integer }
        currentUses: { type: integer }
        perUserLimit: { type: integer }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreateCouponRequest:
      type: object
      properties:
        discountId: { $ref: "#/components/schemas/ID" }
        code: { type: string }
        maxUses: { type: integer }
        perUserLimit: { type: integer }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
      required: [discountId, code]

    CouponUsage:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        couponId: { $ref: "#/components/schemas/ID" }
        userId: { $ref: "#/components/schemas/ID" }
        orderId: { $ref: "#/components/schemas/ID" }
        usedAt: { type: string, format: date-time }

    ValidateCouponRequest:
      type: object
      properties:
        code: { type: string }
        orderAmount: { $ref: "#/components/schemas/Money" }
      required: [code]

    ValidateCouponResponse:
      type: object
      properties:
        valid: { type: boolean }
        discount: { $ref: "#/components/schemas/Discount" }
        message: { type: string }

    # ── Articles ──────────────────────────────────────────────────────────
    Article:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        title: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        excerpt: { $ref: "#/components/schemas/LocaleJson" }
        content: { $ref: "#/components/schemas/LocaleJson" }
        author: { type: string }
        published: { type: boolean }
        publishedAt: { type: string, format: date-time }
        featuredAssetUrl: { type: string, format: uri }
        seoTitle: { $ref: "#/components/schemas/LocaleJson" }
        seoDescription: { $ref: "#/components/schemas/LocaleJson" }
        categories:
          type: array
          items: { $ref: "#/components/schemas/ArticleCategory" }
        tags:
          type: array
          items: { $ref: "#/components/schemas/ArticleTag" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ArticleSummary:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        title: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        excerpt: { $ref: "#/components/schemas/LocaleJson" }
        author: { type: string }
        publishedAt: { type: string, format: date-time }
        featuredAssetUrl: { type: string, format: uri }
        categories:
          type: array
          items: { $ref: "#/components/schemas/ArticleCategory" }
        tags:
          type: array
          items: { $ref: "#/components/schemas/ArticleTag" }

    ArticleCategory:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }

    ArticleTag:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }

    # ── Banners ───────────────────────────────────────────────────────────
    Banner:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        title: { $ref: "#/components/schemas/LocaleJson" }
        subtitle: { $ref: "#/components/schemas/LocaleJson" }
        imageUrl: { type: string, format: uri }
        linkUrl: { type: string, format: uri }
        position: { type: string, enum: [hero, promo, sidebar, footer] }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }

    # ── Dashboard / Stats ─────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totalRevenue: { $ref: "#/components/schemas/Money" }
        totalOrders: { type: integer }
        totalCustomers: { type: integer }
        totalProducts: { type: integer }
        averageOrderValue: { $ref: "#/components/schemas/Money" }
        ordersToday: { type: integer }
        revenueToday: { $ref: "#/components/schemas/Money" }
        pendingOrders: { type: integer }
        lowStockCount: { type: integer }

    RevenueOverTime:
      type: object
      properties:
        period: { type: string, enum: [daily, weekly, monthly, yearly] }
        data:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              revenue: { $ref: "#/components/schemas/Money" }
              orders: { type: integer }

    TopProduct:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        name: { $ref: "#/components/schemas/LocaleJson" }
        slug: { type: string }
        totalSold: { type: integer }
        totalRevenue: { $ref: "#/components/schemas/Money" }
        image: { type: string, format: uri }

    # ── Uploads ───────────────────────────────────────────────────────────
    UploadResponse:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        url: { type: string, format: uri }
        presignedUrl: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }

    # ── Customers ─────────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id: { $ref: "#/components/schemas/ID" }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string }
        avatarUrl: { type: string }
        isActive: { type: boolean }
        orderCount: { type: integer }
        totalSpent: { $ref: "#/components/schemas/Money" }
        createdAt: { type: string, format: date-time }

    # ── Settings ──────────────────────────────────────────────────────────
    Setting:
      type: object
      properties:
        key: { type: string }
        value: { type: object }
        groupName: { type: string }
        isPublic: { type: boolean }
        description: { type: string }

    # ── Admin Auth ────────────────────────────────────────────────────────
    AdminLoginResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            token: { type: string }
            admin:
              type: object
              properties:
                id: { $ref: "#/components/schemas/ID" }
                email: { type: string }
                role: { type: string, enum: [super_admin, admin, editor] }

# ═══════════════════════════════════════════════════════════════════════════
# STOREFRONT API PATHS
# ═══════════════════════════════════════════════════════════════════════════
paths:
  # ── Authentication ──────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new customer account
      operationId: registerCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Account created — verification email sent
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/verify:
    post:
      tags: [Authentication]
      summary: Verify email address with token
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        "200":
          description: Email verified

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with email and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Invalidate current session
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Logged out

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Request password reset email
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
              required: [email]
      responses:
        "200":
          description: Reset email sent if account exists

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password with token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string, minLength: 6 }
              required: [token, password]
      responses:
        "200":
          description: Password reset

  /auth/change-password:
    post:
      tags: [Authentication]
      summary: Change current password (authenticated)
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 6 }
              required: [currentPassword, newPassword]
      responses:
        "200":
          description: Password changed

  /auth/change-email:
    post:
      tags: [Authentication]
      summary: Request email change
      operationId: requestEmailChange
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string }
                newEmail: { type: string, format: email }
              required: [password, newEmail]
      responses:
        "200":
          description: Verification sent to new email

  # ── Products ────────────────────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List/search products with faceted filters
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 12 }
        - name: search
          in: query
          schema: { type: string }
          description: Full-text search term
        - name: categorySlug
          in: query
          schema: { type: string }
        - name: brandSlug
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [name-asc, name-desc, price-asc, price-desc, newest] }
        - name: minPrice
          in: query
          schema: { type: integer }
        - name: maxPrice
          in: query
          schema: { type: integer }
        - name: isFeatured
          in: query
          schema: { type: boolean }
        - name: facetValues
          in: query
          schema: { type: string }
          description: Comma-separated facet value IDs
      responses:
        "200":
          description: Paginated product list with facets
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/ProductSummary" }
                      facets:
                        type: array
                        items:
                          type: object
                          properties:
                            groupName: { type: string }
                            values:
                              type: array
                              items:
                                type: object
                                properties:
                                  id: { $ref: "#/components/schemas/ID" }
                                  name: { type: string }
                                  count: { type: integer }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }

  /products/{slug}:
    get:
      tags: [Products]
      summary: Get product detail by slug
      operationId: getProduct
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Product" }
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{slug}/variants:
    get:
      tags: [Products]
      summary: Get product variants
      operationId: getProductVariants
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: List of variants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ProductVariant" }

  /products/{slug}/reviews:
    get:
      tags: [Reviews]
      summary: List reviews for a product
      operationId: listProductReviews
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 10 }
        - name: sort
          in: query
          schema: { type: string, enum: [newest, oldest, highest, lowest], default: newest }
      responses:
        "200":
          description: Paginated reviews with stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Review" }
                      stats: { $ref: "#/components/schemas/ReviewStats" }
                  meta: { $ref: "#/components/schemas/PaginationMeta" }
    post:
      tags: [Reviews]
      summary: Create a review for a product
      operationId: createReview
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReviewRequest" }
      responses:
        "201":
          description: Review created (pending approval)
        "409":
          $ref: "#/components/responses/Conflict"

  /search:
    get:
      tags: [Products]
      summary: Full-text search with faceted filters
      operationId: searchProducts
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 12 }
        - name: sort
          in: query
          schema: { type: string, enum: [name-asc, name-desc, price-asc, price-desc, relevance] }
        - name: facetValues
          in: query
          schema: { type: string }
          description: Comma-separated facet value IDs
        - name: minPrice
          in: query
          schema: { type: integer }
        - name: maxPrice
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Search results with facet counts

  # ── Categories ──────────────────────────────────────────────────────────
  /categories:
    get:
      tags: [Categories]
      summary: List category tree
      operationId: listCategories
      parameters:
        - name: parentId
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Category tree
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Category" }

  /categories/{slug}:
    get:
      tags: [Categories]
      summary: Get category detail by slug
      operationId: getCategory
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Category" }

  /categories/{slug}/products:
    get:
      tags: [Categories]
      summary: List products in a category
      operationId: getCategoryProducts
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 12 }
        - name: sort
          in: query
          schema: { type: string, enum: [name-asc, name-desc, price-asc, price-desc, newest] }
      responses:
        "200":
          description: Paginated products in category

  # ── Brands ──────────────────────────────────────────────────────────────
  /brands:
    get:
      tags: [Brands]
      summary: List all active brands
      operationId: listBrands
      responses:
        "200":
          description: List of brands
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Brand" }

  /brands/{slug}:
    get:
      tags: [Brands]
      summary: Get brand detail by slug
      operationId: getBrand
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Brand detail

  /brands/{slug}/products:
    get:
      tags: [Brands]
      summary: List products by brand
      operationId: getBrandProducts
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: Paginated products

  # ── Inventory ───────────────────────────────────────────────────────────
  /inventory/variants/{variantId}:
    get:
      tags: [Inventory]
      summary: Check stock level for a variant
      operationId: getVariantInventory
      parameters:
        - name: variantId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Inventory info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Inventory" }

  # ── Cart ────────────────────────────────────────────────────────────────
  /cart:
    get:
      tags: [Cart]
      summary: Get current cart
      operationId: getCart
      security:
        - BearerAuth: []
        - SessionId: []
      responses:
        "200":
          description: Current cart
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Cart" }

  /cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      operationId: addCartItem
      security:
        - BearerAuth: []
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddCartItemRequest" }
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Cart" }
        "400":
          description: Insufficient stock

  /cart/items/{lineId}:
    patch:
      tags: [Cart]
      summary: Update cart item quantity
      operationId: updateCartItem
      security:
        - BearerAuth: []
        - SessionId: []
      parameters:
        - name: lineId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCartItemRequest" }
      responses:
        "200":
          description: Cart updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Cart" }
    delete:
      tags: [Cart]
      summary: Remove item from cart
      operationId: removeCartItem
      security:
        - BearerAuth: []
        - SessionId: []
      parameters:
        - name: lineId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Cart" }

  /cart/coupons:
    post:
      tags: [Cart]
      summary: Apply coupon code to cart
      operationId: applyCoupon
      security:
        - BearerAuth: []
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApplyCouponRequest" }
      responses:
        "200":
          description: Coupon applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Cart" }
        "400":
          description: Invalid or expired coupon

  /cart/coupons/{code}:
    delete:
      tags: [Cart]
      summary: Remove coupon from cart
      operationId: removeCoupon
      security:
        - BearerAuth: []
        - SessionId: []
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Coupon removed

  # ── Checkout ────────────────────────────────────────────────────────────
  /checkout/customer:
    post:
      tags: [Checkout]
      summary: Set customer info for guest checkout
      operationId: setCheckoutCustomer
      security:
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetCustomerRequest" }
      responses:
        "200":
          description: Customer set

  /checkout/shipping-address:
    post:
      tags: [Checkout]
      summary: Set shipping address
      operationId: setShippingAddress
      security:
        - BearerAuth: []
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddressInput" }
      responses:
        "200":
          description: Shipping address set

  /checkout/billing-address:
    post:
      tags: [Checkout]
      summary: Set billing address
      operationId: setBillingAddress
      security:
        - BearerAuth: []
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddressInput" }
      responses:
        "200":
          description: Billing address set

  /checkout/shipping-methods:
    get:
      tags: [Checkout]
      summary: Get eligible shipping methods
      operationId: getEligibleShippingMethods
      security:
        - BearerAuth: []
        - SessionId: []
      responses:
        "200":
          description: Eligible shipping methods
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ShippingMethod" }

  /checkout/shipping-method:
    post:
      tags: [Checkout]
      summary: Select shipping method
      operationId: selectShippingMethod
      security:
        - BearerAuth: []
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SelectShippingMethodRequest" }
      responses:
        "200":
          description: Shipping method selected

  /checkout/payment-methods:
    get:
      tags: [Checkout]
      summary: Get eligible payment methods
      operationId: getEligiblePaymentMethods
      security:
        - BearerAuth: []
        - SessionId: []
      responses:
        "200":
          description: Eligible payment methods

  /checkout/payment:
    post:
      tags: [Checkout]
      summary: Place order
      operationId: placeOrder
      security:
        - BearerAuth: []
        - SessionId: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlaceOrderRequest" }
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Order" }
        "400":
          description: Payment failed or validation error

  /checkout/summary:
    get:
      tags: [Checkout]
      summary: Get checkout summary
      operationId: getCheckoutSummary
      security:
        - BearerAuth: []
        - SessionId: []
      responses:
        "200":
          description: Checkout summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/CheckoutSummary" }

  # ── Orders ──────────────────────────────────────────────────────────────
  /orders:
    get:
      tags: [Orders]
      summary: Get customer order history
      operationId: listMyOrders
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 10 }
        - name: status
          in: query
          schema: { type: string, enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded] }
      responses:
        "200":
          description: Paginated orders

  /orders/{code}:
    get:
      tags: [Orders]
      summary: Get order detail by code
      operationId: getMyOrder
      security:
        - BearerAuth: []
        - SessionId: []
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string, example: "MA-20260713-0001" }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/Order" }
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Coupons (Public) ────────────────────────────────────────────────────
  /coupons/validate:
    post:
      tags: [Coupons]
      summary: Validate a coupon code
      operationId: validateCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ValidateCouponRequest" }
      responses:
        "200":
          description: Coupon validation result

  # ── Account ─────────────────────────────────────────────────────────────
  /account/profile:
    get:
      tags: [Account]
      summary: Get customer profile
      operationId: getMyProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/UserProfile" }
    patch:
      tags: [Account]
      summary: Update customer profile
      operationId: updateMyProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                phone: { type: string }
      responses:
        "200":
          description: Profile updated

  /account/addresses:
    get:
      tags: [Account]
      summary: List customer addresses
      operationId: listMyAddresses
      security:
        - BearerAuth: []
      responses:
        "200":
